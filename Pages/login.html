<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Baloo+Bhai+2:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href=""
      type="image/x-icon"
    />
    <link rel="stylesheet" href="login-Style.css" />
    <title>Login</title>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h2>NoteNest</h2>
      </div>
      <h1>Welcome Back</h1>
      <p class="tag">Knowledge is free for all</p>
      <form action="">
        <div class="Links">
          <a href="#"
            ><img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
            /><span>Continue With Google</span></a
          >
          <a href="#"
            ><img
              src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
            /><span>Continue With Microsoft</span></a
          >
          <a href="#"
            ><img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg"
            /><span>Continue With Facebook</span></a
          >
        </div>
        <div><p>OR</p></div>
        <div class="input-box" style="margin-bottom: 30px">
          <input type="email" placeholder="E-mail" />
        </div>
        <div class="input-box">
          <input type="password" name="" id="" placeholder="Password" />
        </div>
        <div class="fgt"><a href="#">Forgot password?</a></div>
        <div class="btn"><button type="submit">Login</button></div>
        <div class="acc">
          <a href="Registration.html">Don't have an Account?</a>
        </div>
      </form>
    </div>
  </body>
</html>
